<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Авторизация</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="entrence">Войдите в аккаунт</h1>
    <p>
    <form class="window">
        Имя:
        <input type="text" name="firstname" id="firstname" maxlength="10" placeholder="Не более 10 символов"><br>
        Фамилия:
        <input type="text" name="lastname" id="lastname" maxlength="10" placeholder="Не более 10 символов"><br>
        Пароль:
        <input type="password" name="password" id="password" maxlength="16" placeholder="Не более 16 символов"><br>
        Выберите роль пользователя:<br>
        <select name="Role">
            <option value="1">Клиент</option>
            <option value="2">Механик</option>
            <option value="1">Владелец(Администратор)</option>
            <option value="1">Автомойщик</option>
            <option value="1">Кладовщик</option>
        </select><br>
        <p><input type="submit">
            <input type="reset" value="Начать заново">
        </p>
    </form>
    </p>

</body>
